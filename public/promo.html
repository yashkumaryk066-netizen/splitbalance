<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SettleStack Ad Preview</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e1b4b, #0f172a);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .ad-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .phone-mockup {
            width: 250px;
            height: 500px;
            background: #000;
            border-radius: 40px;
            border: 8px solid #334155;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            position: relative;
            transform: translateY(100px) rotateY(-20deg);
            opacity: 0;
            overflow: hidden;
        }

        .phone-screen {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex; flex-direction: column;
            padding: 20px; box-sizing: border-box;
        }

        .header { font-weight: 800; font-size: 18px; margin-bottom: 20px; }
        .card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .btn { margin-top: auto; background: #22d3ee; color: #000; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; }

        .text-overlay {
            position: absolute;
            bottom: 100px;
            text-align: center;
            opacity: 0;
        }

        .headline {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(to right, #22d3ee, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .glow {
            position: absolute;
            width: 400px; height: 400px;
            background: #4f46e5;
            filter: blur(150px);
            opacity: 0.3;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="ad-container">
        <div class="phone-mockup" id="phone">
            <div class="phone-screen">
                <div class="header">SettleStack</div>
                <div class="card" style="height: 40px;"></div>
                <div class="card" style="height: 40px;"></div>
                <div class="card" style="height: 40px;"></div>
                <div class="btn">SETTLE UP 🚀</div>
            </div>
        </div>
        
        <div class="text-overlay" id="text">
            <div class="headline">Split Made Simple.</div>
            <div style="font-size: 20px; opacity: 0.8;">Stop fighting, start settling.</div>
        </div>
    </div>

    <script>
        const tl = gsap.timeline({ repeat: -1, repeatDelay: 1 });

        tl.to("#phone", { 
            opacity: 1, 
            y: 0, 
            rotateY: 20, 
            duration: 1.5, 
            ease: "power4.out" 
        })
        .to("#text", { 
            opacity: 1, 
            bottom: 150, 
            duration: 1, 
            ease: "back.out(1.7)" 
        }, "-=0.5")
        .to("#phone", {
            y: -20,
            duration: 2,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });
    </script>
</body>
</html>
